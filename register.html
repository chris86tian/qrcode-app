<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrieren - K1Q.de QR-Code Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <!-- Reusing login page styles -->
    <style>
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .auth-container h1 { margin-bottom: 20px; color: #333; }
        .auth-container .form-group { margin-bottom: 15px; text-align: left; }
        .auth-container label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        .auth-container input[type="email"],
        .auth-container input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .auth-container button[type="submit"],
        .auth-container .google-btn { width: 100%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 10px; transition: background-color 0.3s ease; }
        .auth-container button[type="submit"] { background-color: #28a745; color: white; }
        .auth-container button[type="submit"]:hover { background-color: #218838; }
         .auth-container .google-btn { background-color: #db4437; color: white; text-decoration: none; display: inline-block; box-sizing: border-box; }
        .auth-container .google-btn:hover { background-color: #c33d2e; }
        .auth-container .separator { margin: 20px 0; border-bottom: 1px solid #eee; line-height: 0.1em; text-align: center; }
        .auth-container .separator span { background: #fff; padding: 0 10px; color: #aaa; }
        .auth-container .switch-auth { margin-top: 20px; color: #555; }
        .auth-container .switch-auth a { color: #007bff; text-decoration: none; font-weight: 600; }
        .auth-container .switch-auth a:hover { text-decoration: underline; }
        .error-message { color: #dc3545; background-color: #f8d7da; border: 1px solid #f5c6cb; padding: 10px; border-radius: 4px; margin-bottom: 15px; text-align: left; list-style: none; }
    </style>
</head>
<body>
     <header>
        <div class="site-title"><a href="/">K1Q.de</a></div>
        <div class="header-text">
            <h1>Registrieren</h1>
        </div>
         <div class="header-auth">
            <!-- Links shown when not logged in -->
            <a href="/login">Anmelden</a>
            <a href="/register">Registrieren</a>
        </div>
    </header>

    <main class="auth-container">
        <h1>Neues Konto erstellen</h1>

        <!-- Display Registration Errors -->
        <ul id="error-messages"></ul>

        <form action="/register" method="POST">
            <div class="form-group">
                <label for="email">E-Mail:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Passwort:</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>
            <div class="form-group">
                <label for="password2">Passwort bestätigen:</label>
                <input type="password" id="password2" name="password2" required minlength="6">
            </div>
            <button type="submit">Registrieren</button>
        </form>

         <div class="separator"><span>ODER</span></div>

        <a href="/auth/google" class="google-btn">Mit Google registrieren</a>

        <p class="switch-auth">
            Bereits ein Konto? <a href="/login">Jetzt anmelden</a>
        </p>
    </main>

    <footer>
        <a href="impressum.html">Impressum</a> | <a href="datenschutz.html">Datenschutz</a> | <a href="blog-qr-code-mit-logo.html">Blog</a>
        <p>&copy; 2025 K1Q.de QR-Code Generator</p>
    </footer>

     <script>
        // Simple script to display errors from URL parameters
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const errorMessagesUl = document.getElementById('error-messages');
            const errors = params.getAll('error'); // Get all error messages

            if (errors.length > 0) {
                errors.forEach(msg => {
                    const li = document.createElement('li');
                    li.textContent = decodeURIComponent(msg); // Decode URL encoded message
                    errorMessagesUl.appendChild(li);
                });
                errorMessagesUl.classList.add('error-message'); // Add styling class
            }
        });
    </script>
</body>
</html>
